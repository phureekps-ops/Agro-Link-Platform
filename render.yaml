# AgroLink Platform — Render Blueprint
#
# Deploys three pieces from this one repo, wired together automatically:
#   1. agrolink-db        — managed Postgres database
#   2. agrolink-backend   — the Node/Express API (backend/)
#   3. agrolink-frontend  — the static farmer/lender/buyer/admin/etc. portals (frontend/)
#
# How to use this file: see DEPLOY.md at the repo root for the full
# step-by-step walkthrough (account creation, connecting GitHub, running the
# one-time database setup scripts, verifying the deploy). This file only
# describes *what* gets created — Render's "New Blueprint" flow reads it
# from your repo and provisions all three services in one go.
#
# The database plan is "basic-256mb" (~$6/month) rather than "free" because
# Render only allows one active free-tier Postgres database per account, and
# this account already has one in use by another project. The backend and
# frontend stay on the free plan. Read DEPLOY.md's "แผนราคา" (pricing)
# section for the tradeoffs — the free web service plan spins down after 15
# minutes of no traffic (the first request after that takes ~1 minute to
# wake back up); change `plan: free` to `plan: starter` below once ready to
# keep the pilot running continuously.

databases:
  - name: agrolink-db
    plan: basic-256mb
    region: singapore
    databaseName: agrolink
    user: agrolink

services:
  - type: web
    runtime: node
    name: agrolink-backend
    plan: free
    region: singapore
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: agrolink-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 8h
      - key: ADMIN_PASSCODE
        generateValue: true
      - key: NODE_ENV
        value: production

  - type: web
    runtime: static
    name: agrolink-frontend
    rootDir: frontend
    buildCommand: echo "no build step needed"
    staticPublishPath: .
